<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Reveal Grid</title>

<style>
body{
    margin:0;
    background:#e5e5e5;
    font-family:Arial, sans-serif;
}

.container{
    max-width:1000px;
    margin:60px auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:80px 120px;
}

.card{
    position:relative;
    width:100%;
    aspect-ratio:1/2;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0;
    left:0;
}

.cover{
    z-index:2;
    transition:transform 0.6s ease;
}

.card.reveal .cover{
    transform:translateY(-100%);
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

<div class="card">
    <img src="intimg.png" alt="hidden image">
    <img class="cover" src="closedwindow.png" alt="cover">
</div>

</div>

<script>
document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
        card.classList.toggle("reveal");
    });
});
</script>

</body>
</html>
